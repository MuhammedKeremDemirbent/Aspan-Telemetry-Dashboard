<!-- Navbar Navbar -->
<header id="navbar" class="fixed top-0 right-0 left-0 lg:left-72 z-30 transition-all duration-500">
    <div class="m-4 lg:m-6 h-16 glass-card rounded-2xl flex items-center justify-between px-6 border border-white/10 shadow-xl">
        
        <!-- Left Side (Search/Title) -->
        <div class="flex items-center gap-4">
            <!-- Page Title -->
            <div>
                <h2 class="text-white font-semibold text-lg tracking-tight">Kontrol Paneli</h2>
            </div>
        </div>

        <!-- Right Side (User Info) -->

            <!-- User Profile Link -->
            <a href="{% url 'profile' %}" class="flex items-center gap-3 pl-4 border-l border-white/5 py-2 group cursor-pointer hover:opacity-80 transition-all">

                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500/20 to-purple-500/20 border border-indigo-500/30 flex items-center justify-center text-indigo-400 transition-all group-hover:border-indigo-400 group-hover:shadow-lg group-hover:shadow-indigo-500/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
